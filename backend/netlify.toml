[build]
command = "echo Building Functions"
functions = "netlify/functions"
publish = "."

[functions]
external_node_modules = ["express", "cors", "mongoose", "cloudinary", "multer", "bcrypt", "jsonwebtoken", "razorpay", "stripe", "validator", "dotenv"]
node_bundler = "esbuild"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
force = true

[[redirects]]
from = "/"
to = "/.netlify/functions/api/"
status = 200
force = true
