<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Backend API</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #111827;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 720px;
        margin: 24px;
        padding: 32px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin-top: 0;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
      ul {
        line-height: 1.7;
      }
      a {
        color: #2563eb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>E-Commerce Backend API</h1>
      <p>This Netlify site is serving the backend API for the E-Commerce App.</p>
      <p>Try these endpoints:</p>
      <ul>
        <li><a href="/api/product/list"><code>/api/product/list</code></a></li>
        <li><code>/api/user/login</code></li>
        <li><code>/api/cart/get</code></li>
        <li><code>/api/order/list</code></li>
      </ul>
      <p>If the API routes fail, check Netlify environment variables and function logs.</p>
    </main>
  </body>
  </html>
